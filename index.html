<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleira Inteligente - V4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f0f0; }
        
        .header {
            background: #3b5998;
            color: white;
            padding: 15px;
            font-size: 20px;
            text-align: center;
        }
        
        .row {
            display: flex;
            background: #e0e0e0;
            padding: 10px;
            margin: 5px 0;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-azul { background: #3b5998; color: white; }
        .btn-cinza { background: #666; color: white; }
        .btn-verde { background: #4CAF50; color: white; }
        .btn-vermelho { background: #f44336; color: white; }
        
        .texto {
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            margin: 5px;
            flex: 1;
        }
        
        .area-log {
            background: white;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            overflow-x: hidden;
            font-size: 12px;
            font-family: monospace;
        }
        
        .select {
            padding: 8px;
            margin: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        
        .campo {
            padding: 10px;
            margin: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            width: calc(100% - 20px);
            font-size: 14px;
        }
        
        .status-box {
            background: white;
            border: 2px solid #3b5998;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }
        
        .status-box h3 {
            color: #3b5998;
            margin-bottom: 10px;
        }
        
        .alerta {
            background: #ffeb3b;
            border: 2px solid #ff9800;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .alerta.perigo {
            background: #ffcdd2;
            border-color: #f44336;
            color: #c62828;
        }
        
        .alerta.atencao {
            background: #fff9c4;
            border-color: #ff9800;
            color: #ef6c00;
        }
        
        .alerta.normal {
            background: #c8e6c9;
            border-color: #4CAF50;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="header">Coleira Inteligente - Monitoramento Comportamental</div>
    
    <div class="row">
        <button class="btn btn-cinza" onclick="scanDevices()">Dispositivos</button>
        <div class="texto" id="status">Não conectado</div>
    </div>
    
    <div class="row">
        <button class="btn btn-verde" id="btnLigar" onclick="conectar()" style="display:none">Conectar</button>
        <button class="btn btn-vermelho" id="btnDesligar" onclick="desconectar()" style="display:none">Desconectar</button>
        <button class="btn btn-cinza" id="btnReset" onclick="resetConexao()" style="display:none">Reset</button>
    </div>
    
    <div class="status-box">
        <h3>Status do Animal</h3>
        <input type="text" class="campo" id="campoDistancia" placeholder="Distância (RSSI)" readonly>
        <input type="text" class="campo" id="campoAceleracao" placeholder="Movimento" readonly>
        <input type="text" class="campo" id="campoComportamento" placeholder="Comportamento" readonly>
    </div>
    
    <div class="alerta" id="alerta">
        <div id="alertaTexto">-</div>
    </div>
    
    <div class="area-log" id="logEventos">
        <strong>Log de Eventos:</strong><br>
    </div>

    <script>
        let device = null;
        let server = null;
        let characteristic = null;
        let conectado = false;
        let lastDataTime = 0;
        let rssiEstimate = -60;
        
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        
        let logLines = [];
        const MAX_LOG_LINES = 50;
        
        function addLog(texto) {
            const log = document.getElementById('logEventos');
            const hora = new Date().toLocaleTimeString();
            logLines.push(`[${hora}] ${texto}`);
            
            if(logLines.length > MAX_LOG_LINES) {
                logLines.shift();
            }
            
            log.innerHTML = '<strong>Log de Eventos:</strong><br>' + logLines.join('<br>');
            log.scrollTop = log.scrollHeight;
        }
        
        async function scanDevices() {
            try {
                addLog("Buscando dispositivos...");
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'ColeiraInteligente' },
                        { services: [SERVICE_UUID] }
                    ],
                    optionalServices: [SERVICE_UUID]
                });
                
                addLog("Dispositivo selecionado: " + device.name);
                document.getElementById('status').innerText = 'Selecionado: ' + device.name;
                document.getElementById('btnLigar').style.display = 'inline';
                
            } catch(erro) {
                if(erro.message.includes('cancelled')) {
                    addLog("Busca cancelada");
                } else {
                    addLog("Erro: " + erro.message);
                }
            }
        }
        
        async function conectar() {
            try {
                addLog("Conectando...");
                
                if(!device) {
                    addLog("Erro: Nenhum dispositivo selecionado");
                    return;
                }
                
                // Remove event listeners antigos
                device.removeEventListener('gattserverdisconnected', onDisconnected);
                
                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', receberDados);
                
                conectado = true;
                lastDataTime = Date.now();
                
                document.getElementById('status').innerText = 'Conectado';
                document.getElementById('btnLigar').style.display = 'none';
                document.getElementById('btnDesligar').style.display = 'inline';
                document.getElementById('btnReset').style.display = 'inline';
                
                addLog("Conectado com sucesso!");
                
            } catch(erro) {
                addLog("Erro ao conectar: " + erro.message);
                resetConexao();
            }
        }
        
        async function desconectar() {
            try {
                addLog("Desconectando...");
                
                if(characteristic) {
                    try {
                        await characteristic.stopNotifications();
                    } catch(e) {
                        // Ignora erro se já estiver parado
                    }
                    characteristic.removeEventListener('characteristicvaluechanged', receberDados);
                    characteristic = null;
                }
                
                if(server) {
                    try {
                        if(server.connected) {
                            server.disconnect();
                        }
                    } catch(e) {
                        // Ignora erro
                    }
                    server = null;
                }
                
                if(device) {
                    device.removeEventListener('gattserverdisconnected', onDisconnected);
                }
                
                onDisconnected();
                
            } catch(erro) {
                addLog("Erro ao desconectar: " + erro.message);
                resetConexao();
            }
        }
        
        function resetConexao() {
            addLog("Resetando conexão...");
            
            device = null;
            server = null;
            characteristic = null;
            conectado = false;
            
            document.getElementById('status').innerText = 'Não conectado';
            document.getElementById('btnLigar').style.display = 'none';
            document.getElementById('btnDesligar').style.display = 'none';
            document.getElementById('btnReset').style.display = 'none';
            document.getElementById('campoDistancia').value = '';
            document.getElementById('campoAceleracao').value = '';
            document.getElementById('campoComportamento').value = '';
            document.getElementById('alerta').style.display = 'none';
            
            addLog("Conexão resetada. Selecione o dispositivo novamente.");
        }
        
        function onDisconnected() {
            addLog("Desconectado automaticamente");
            resetConexao();
        }
        
        function receberDados(event) {
            if(!conectado) return;
            
            const valor = event.target.value;
            const texto = new TextDecoder().decode(valor);
            const partes = texto.split(',');
            
            if(partes.length >= 6) {
                const ax = parseFloat(partes[0]);
                const ay = parseFloat(partes[1]);
                const az = parseFloat(partes[2]);
                const gx = parseFloat(partes[3]);
                const gy = parseFloat(partes[4]);
                const gz = parseFloat(partes[5]);
                
                // Atualiza timestamp
                lastDataTime = Date.now();
                
                // Estima RSSI baseado na latência (simulação)
                const now = Date.now();
                const latency = now - lastDataTime;
                rssiEstimate = -60 - (latency * 0.1);
                if(rssiEstimate < -90) rssiEstimate = -90;
                if(rssiEstimate > -40) rssiEstimate = -40;
                
                // Calcula magnitude da aceleração
                const mag = Math.sqrt(ax**2 + ay**2 + az**2);
                
                // Calcula magnitude do giroscópio
                const giroMag = Math.sqrt(gx**2 + gy**2 + gz**2);
                
                // Interpreta comportamento
                let comportamento = '';
                
                if(mag < 10.5 && giroMag < 0.1) {
                    comportamento = 'PARADO';
                } else if(mag < 11 && giroMag < 0.5) {
                    comportamento = 'MOVIMENTO LEVE';
                } else if(mag < 12 && giroMag < 1.5) {
                    comportamento = 'ANDANDO';
                } else if(mag >= 12 || giroMag >= 1.5) {
                    comportamento = 'CORRENDO';
                } else {
                    comportamento = 'AGITADO';
                }
                
                // Estima distância baseada no RSSI
                let distancia = 'Desconhecida';
                if(rssiEstimate > -50) {
                    distancia = 'Próximo (< 1m)';
                } else if(rssiEstimate > -70) {
                    distancia = 'Médio (1-3m)';
                } else {
                    distancia = 'Distante (> 3m)';
                }
                
                // Atualiza campos
                document.getElementById('campoDistancia').value = 
                    `RSSI: ${rssiEstimate.toFixed(0)} dBm - ${distancia}`;
                
                document.getElementById('campoAceleracao').value = 
                    `${comportamento} (Magnitude: ${mag.toFixed(1)} m/s²)`;
                
                document.getElementById('campoComportamento').value = 
                    `Estado: ${comportamento}`;
                
                // Gera alertas contextuais
                gerarAlerta(comportamento, distancia, mag, giroMag);
                
                addLog(`${comportamento} | RSSI: ${rssiEstimate.toFixed(0)} dBm | Mag: ${mag.toFixed(1)}`);
            }
        }
        
        function gerarAlerta(comportamento, distancia, mag, giroMag) {
            const alerta = document.getElementById('alerta');
            const alertaTexto = document.getElementById('alertaTexto');
            
            if(comportamento === 'CORRENDO' && distancia.includes('Distante')) {
                alerta.className = 'alerta perigo';
                alertaTexto.innerText = 'ALERTA: Possível fuga detectada!';
                alerta.style.display = 'block';
            } else if(giroMag > 2 && comportamento === 'AGITADO') {
                alerta.className = 'alerta atencao';
                alertaTexto.innerText = 'Atenção: Animal agitado/estressado';
                alerta.style.display = 'block';
            } else if(comportamento === 'PARADO') {
                alerta.className = 'alerta normal';
                alertaTexto.innerText = 'Animal em repouso';
                alerta.style.display = 'block';
            } else {
                alerta.style.display = 'none';
            }
        }
    </script>
</body>
</html>
