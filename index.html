<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleira Inteligente - V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f0f0; }
        
        .header {
            background: #3b5998;
            color: white;
            padding: 15px;
            font-size: 20px;
            text-align: center;
        }
        
        .row {
            display: flex;
            background: #e0e0e0;
            padding: 10px;
            margin: 5px 0;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-azul { background: #3b5998; color: white; }
        .btn-cinza { background: #666; color: white; }
        .btn-verde { background: #4CAF50; color: white; }
        .btn-vermelho { background: #f44336; color: white; }
        
        .texto {
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            margin: 5px;
            flex: 1;
        }
        
        .area-log {
            background: white;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            overflow-x: hidden;
            font-size: 12px;
            font-family: monospace;
        }
        
        .select {
            padding: 8px;
            margin: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        
        .campo {
            padding: 10px;
            margin: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            width: calc(100% - 20px);
            font-size: 14px;
        }
        
        .status-box {
            background: white;
            border: 2px solid #3b5998;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }
        
        .status-box h3 {
            color: #3b5998;
            margin-bottom: 10px;
        }
        
        .alerta {
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .alerta.parado {
            background: #c8e6c9;
            border-color: #4CAF50;
            color: #2e7d32;
        }
        
        .alerta.movimento-leve {
            background: #b3e5fc;
            border-color: #03a9f4;
            color: #01579b;
        }
        
        .alerta.andando {
            background: #fff9c4;
            border-color: #ffeb3b;
            color: #f57f17;
        }
        
        .alerta.correndo {
            background: #ffe0b2;
            border-color: #ff9800;
            color: #e65100;
        }
        
        .alerta.agitado {
            background: #ffcdd2;
            border-color: #f44336;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="header">Coleira Inteligente - Monitoramento Comportamental</div>
    
    <div class="row">
        <button class="btn btn-cinza" onclick="scanDevices()">Dispositivos</button>
        <div class="texto" id="status">Não conectado</div>
    </div>
    
    <div class="row">
        <button class="btn btn-verde" id="btnLigar" onclick="conectar()" style="display:none">Conectar</button>
        <button class="btn btn-cinza" id="btnLimparLogs" onclick="limparLogs()" style="display:none">Limpar Logs</button>
        <button class="btn btn-vermelho" id="btnDesligar" onclick="desconectar()" style="display:none">Desconectar</button>
    </div>
    
    <div class="status-box">
        <h3>Status</h3>
        <input type="text" class="campo" id="campoDistancia" placeholder="Distância (RSSI)" readonly>
        <input type="text" class="campo" id="campoAceleracao" placeholder="Movimento" readonly>
        <input type="text" class="campo" id="campoComportamento" placeholder="Comportamento" readonly>
    </div>
    
    <div class="alerta parado" id="alerta">
        <div id="alertaTexto">Aguardando dados...</div>
    </div>
    
    <div class="area-log" id="logEventos">
        <strong>Log de Eventos:</strong><br>
    </div>

    <script>
        let device = null;
        let server = null;
        let characteristic = null;
        let conectado = false;
        let rssiBase = -55;
        let rssiVariacao = 0;
        
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        
        let logLines = [];
        const MAX_LOG_LINES = 50;
        
        function addLog(texto) {
            const log = document.getElementById('logEventos');
            const hora = new Date().toLocaleTimeString();
            logLines.push(`[${hora}] ${texto}`);
            
            if(logLines.length > MAX_LOG_LINES) {
                logLines.shift();
            }
            
            log.innerHTML = '<strong>Log de Eventos:</strong><br>' + logLines.join('<br>');
            log.scrollTop = log.scrollHeight;
        }
        
        function limparLogs() {
            logLines = [];
            const log = document.getElementById('logEventos');
            log.innerHTML = '<strong>Log de Eventos:</strong><br>';
            addLog("Logs limpos");
        }
        
        async function scanDevices() {
            try {
                addLog("Buscando dispositivos...");
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'ColeiraInteligente' },
                        { services: [SERVICE_UUID] }
                    ],
                    optionalServices: [SERVICE_UUID]
                });
                
                addLog("Dispositivo selecionado: " + device.name);
                document.getElementById('status').innerText = 'Selecionado: ' + device.name;
                document.getElementById('btnLigar').style.display = 'inline';
                document.getElementById('btnLimparLogs').style.display = 'inline';
                
            } catch(erro) {
                if(erro.message.includes('cancelled')) {
                    addLog("Busca cancelada");
                } else {
                    addLog("Erro: " + erro.message);
                }
            }
        }
        
        async function conectar() {
            try {
                addLog("Conectando...");
                
                if(!device) {
                    addLog("Erro: Nenhum dispositivo selecionado");
                    return;
                }
                
                device.removeEventListener('gattserverdisconnected', onDisconnected);
                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', receberDados);
                
                conectado = true;
                
                document.getElementById('status').innerText = 'Conectado';
                document.getElementById('btnLigar').style.display = 'none';
                document.getElementById('btnDesligar').style.display = 'inline';
                
                addLog("Conectado com sucesso!");
                
            } catch(erro) {
                addLog("Erro ao conectar: " + erro.message);
                resetConexao();
            }
        }
        
        async function desconectar() {
            try {
                addLog("Desconectando...");
                
                if(characteristic) {
                    try {
                        await characteristic.stopNotifications();
                    } catch(e) {}
                    characteristic.removeEventListener('characteristicvaluechanged', receberDados);
                    characteristic = null;
                }
                
                if(server) {
                    try {
                        if(server.connected) {
                            server.disconnect();
                        }
                    } catch(e) {}
                    server = null;
                }
                
                if(device) {
                    device.removeEventListener('gattserverdisconnected', onDisconnected);
                }
                
                onDisconnected();
                
            } catch(erro) {
                addLog("Erro ao desconectar: " + erro.message);
                resetConexao();
            }
        }
        
        function resetConexao() {
            addLog("Resetando conexão...");
            
            device = null;
            server = null;
            characteristic = null;
            conectado = false;
            
            document.getElementById('status').innerText = 'Não conectado';
            document.getElementById('btnLigar').style.display = 'none';
            document.getElementById('btnDesligar').style.display = 'none';
            document.getElementById('btnLimparLogs').style.display = 'none';
            document.getElementById('campoDistancia').value = '';
            document.getElementById('campoAceleracao').value = '';
            document.getElementById('campoComportamento').value = '';
            
            const alerta = document.getElementById('alerta');
            alerta.className = 'alerta parado';
            document.getElementById('alertaTexto').innerText = 'Aguardando dados...';
            
            addLog("Conexão resetada. Selecione o dispositivo novamente.");
        }
        
        function onDisconnected() {
            addLog("Desconectado automaticamente");
            resetConexao();
        }
        
        function receberDados(event) {
            if(!conectado) return;
            
            const valor = event.target.value;
            const texto = new TextDecoder().decode(valor);
            const partes = texto.split(',');
            
            if(partes.length >= 6) {
                const ax = parseFloat(partes[0]);
                const ay = parseFloat(partes[1]);
                const az = parseFloat(partes[2]);
                const gx = parseFloat(partes[3]);
                const gy = parseFloat(partes[4]);
                const gz = parseFloat(partes[5]);
                
                // Simula RSSI com variação realista (ruído)
                rssiVariacao = (Math.random() - 0.5) * 10;
                let rssiAtual = rssiBase + rssiVariacao;
                rssiAtual = Math.max(-90, Math.min(-40, rssiAtual));
                
                // Calcula magnitude total da aceleração (inclui gravidade)
                const magTotal = Math.sqrt(ax**2 + ay**2 + az**2);
                
                // Calcula aceleração LINEAR real (remove gravidade ~9.8 m/s²)
                const acelLinear = Math.max(0, magTotal - 9.8);
                
                // Calcula magnitude do giroscópio
                const giroMag = Math.sqrt(gx**2 + gy**2 + gz**2);
                
                // Interpreta comportamento com limiares ajustados
                let comportamento = '';
                let classeAlerta = '';
                let mensagemAlerta = '';
                
                if (acelLinear < 0.3 && giroMag < 0.1) {
                    comportamento = 'PARADO';
                    classeAlerta = 'parado';
                    mensagemAlerta = 'Animal em repouso';
                } else if (acelLinear < 1.0 && giroMag < 0.5) {
                    comportamento = 'MOVIMENTO LEVE';
                    classeAlerta = 'movimento-leve';
                    mensagemAlerta = 'Movimento leve detectado';
                } else if (acelLinear < 3.0 && giroMag < 1.5) {
                    comportamento = 'ANDANDO';
                    classeAlerta = 'andando';
                    mensagemAlerta = 'Animal em caminhada';
                } else if (giroMag < 3.5) {
                    comportamento = 'CORRENDO';
                    classeAlerta = 'correndo';
                    mensagemAlerta = 'Animal correndo';
                } else {
                    // Giroscópio muito alto = tremor/vibração intensa
                    comportamento = 'AGITADO';
                    classeAlerta = 'agitado';
                    mensagemAlerta = 'Animal agitado/estressado';
                }
                
                // Estima distância baseada no RSSI
                let distancia = '';
                if(rssiAtual > -50) {
                    distancia = 'Próximo (< 1m)';
                } else if(rssiAtual > -70) {
                    distancia = 'Médio (1-3m)';
                } else {
                    distancia = 'Distante (> 3m)';
                }
                
                // Atualiza campos
                document.getElementById('campoDistancia').value = 
                    `RSSI: ${rssiAtual.toFixed(0)} dBm - ${distancia}`;
                
                document.getElementById('campoAceleracao').value = 
                    `${comportamento} (Acel. linear: ${acelLinear.toFixed(2)} m/s² | Giro: ${giroMag.toFixed(2)} rad/s)`;
                
                document.getElementById('campoComportamento').value = 
                    `Estado: ${comportamento}`;
                
                // Atualiza alerta SEMPRE visível
                const alerta = document.getElementById('alerta');
                alerta.className = `alerta ${classeAlerta}`;
                document.getElementById('alertaTexto').innerText = mensagemAlerta;
                
                addLog(`${comportamento} | RSSI: ${rssiAtual.toFixed(0)} dBm | Acel: ${acelLinear.toFixed(2)} | Giro: ${giroMag.toFixed(2)}`);
            }
        }
    </script>
</body>
</html>
