<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleira Inteligente - V5</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5308/5308419.png">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: Arial, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
        
        body { 
            background: #f0f0f0; 
            color: #222;
        }
        
        /* ===== TEMA ESCURO ===== */
        body.dark { 
            background: #1a1a1a; 
            color: #e0e0e0;
        }
        body.dark .header { background: #1e3a5f; }
        body.dark .row { background: #2a2a2a; }
        body.dark .texto { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
        body.dark .area-log { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
        body.dark .campo { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
        body.dark .status-box { background: #2a2a2a; border-color: #1e3a5f; }
        body.dark .status-box h3 { color: #6fa8dc; }
        body.dark .alerta.parado { background: #1b3a1b; border-color: #4CAF50; color: #81c784; }
        body.dark .alerta.movimento-leve { background: #0d2a3a; border-color: #03a9f4; color: #4fc3f7; }
        body.dark .alerta.andando { background: #3a3510; border-color: #ffeb3b; color: #fff176; }
        body.dark .alerta.correndo { background: #3a2410; border-color: #ff9800; color: #ffb74d; }
        body.dark .alerta.agitado { background: #3a1010; border-color: #f44336; color: #e57373; }
        body.dark .modal { background: #2a2a2a; color: #e0e0e0; }
        body.dark .modal h2 { color: #6fa8dc; }
        body.dark .modal p { color: #aaa; }
        body.dark .modal input { background: #1a1a1a; color: #e0e0e0; border-color: #6fa8dc; }
        
        .header {
            background: #3b5998;
            color: white;
            padding: 15px;
            font-size: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-titulo { flex: 1; text-align: left; }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .nome-individuo {
            font-weight: bold;
            font-style: italic;
        }
        
        .btn-tema {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .btn-tema:hover { background: rgba(255,255,255,0.3); }
        
        .row {
            display: flex;
            background: #e0e0e0;
            padding: 10px;
            margin: 5px 0;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-azul { background: #3b5998; color: white; }
        .btn-cinza { background: #666; color: white; }
        .btn-verde { background: #4CAF50; color: white; }
        .btn-vermelho { background: #f44336; color: white; }
        
        .texto {
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            margin: 5px;
            flex: 1;
        }
        
        .area-log {
            background: white;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            overflow-x: hidden;
            font-size: 12px;
            font-family: monospace;
        }
        
        .campo {
            padding: 10px;
            margin: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            width: calc(100% - 20px);
            font-size: 14px;
            color: #222;
        }
        
        .status-box {
            background: white;
            border: 2px solid #3b5998;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }
        
        .status-box h3 {
            color: #3b5998;
            margin-bottom: 10px;
        }
        
        .alerta {
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .alerta.parado { background: #c8e6c9; border-color: #4CAF50; color: #2e7d32; }
        .alerta.movimento-leve { background: #b3e5fc; border-color: #03a9f4; color: #01579b; }
        .alerta.andando { background: #fff9c4; border-color: #ffeb3b; color: #f57f17; }
        .alerta.correndo { background: #ffe0b2; border-color: #ff9800; color: #e65100; }
        .alerta.agitado { background: #ffcdd2; border-color: #f44336; color: #c62828; }
        
        /* ===== MODAL DE CONFIGURAÇÃO INICIAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .modal h2 {
            color: #3b5998;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .modal p {
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        
        .modal input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #3b5998;
            border-radius: 5px;
            margin-bottom: 15px;
            background: white;
            color: #222;
        }
        
        .modal button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .modal button:hover { background: #45a049; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Modal de configuração inicial - SEMPRE aparece ao abrir -->
    <div class="modal-overlay" id="modalConfig">
        <div class="modal">
            <h2>Coleira Inteligente</h2>
            <p>Antes de iniciar o monitoramento, informe o nome de quem vai usar a coleira (animal, crianca, etc.)</p>
            <input type="text" id="inputNome" placeholder="Ex: Rex, Luna, Joaozinho..." maxlength="30">
            <button onclick="salvarNome()">Iniciar Monitoramento</button>
        </div>
    </div>
    
    <div class="header">
        <div class="header-titulo">Coleira Inteligente</div>
        <div class="header-info">
            <span class="nome-individuo" id="exibeNome"></span>
            <button class="btn-tema" onclick="toggleTema()" id="btnTema">Tema: Claro</button>
        </div>
    </div>
    
    <div class="row">
        <button class="btn btn-cinza" onclick="scanDevices()">Dispositivos</button>
        <div class="texto" id="status">Nao conectado</div>
    </div>
    
    <div class="row">
        <button class="btn btn-verde" id="btnLigar" onclick="conectar()" style="display:none">Conectar</button>
        <button class="btn btn-cinza" id="btnLimparLogs" onclick="limparLogs()" style="display:none">Limpar Logs</button>
        <button class="btn btn-vermelho" id="btnDesligar" onclick="desconectar()" style="display:none">Desconectar</button>
    </div>
    
    <div class="status-box">
        <h3>Status</h3>
        <input type="text" class="campo" id="campoDistancia" placeholder="Distancia (RSSI)" readonly>
        <input type="text" class="campo" id="campoAceleracao" placeholder="Movimento" readonly>
        <input type="text" class="campo" id="campoComportamento" placeholder="Comportamento" readonly>
    </div>
    
    <div class="alerta parado" id="alerta">
        <div id="alertaTexto">Aguardando dados...</div>
    </div>
    
    <div class="area-log" id="logEventos">
        <strong>Log de Eventos:</strong><br>
    </div>

    <script>
        let device = null;
        let server = null;
        let characteristic = null;
        let conectado = false;
        let rssiBase = -55;
        let rssiVariacao = 0;
        let nomeIndividuo = '';
        
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        
        let logLines = [];
        const MAX_LOG_LINES = 50;
        
        // ===== INICIALIZAÇÃO =====
        function init() {
            // Sempre pede o nome ao abrir/reiniciar (sem localStorage)
            document.getElementById('modalConfig').classList.remove('hidden');
            setTimeout(() => document.getElementById('inputNome').focus(), 100);
        }
        
        function salvarNome() {
            const input = document.getElementById('inputNome');
            const nome = input.value.trim();
            
            if (nome.length < 2) {
                input.style.borderColor = '#f44336';
                input.placeholder = 'Digite pelo menos 2 caracteres!';
                return;
            }
            
            nomeIndividuo = nome;
            document.getElementById('exibeNome').innerText = nomeIndividuo;
            document.getElementById('modalConfig').classList.add('hidden');
            addLog(`Monitoramento iniciado para: ${nomeIndividuo}`);
        }
        
        function toggleTema() {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('btnTema');
            btn.innerText = document.body.classList.contains('dark') ? 'Tema: Escuro' : 'Tema: Claro';
        }
        
        // ===== LOGS =====
        function addLog(texto) {
            const log = document.getElementById('logEventos');
            const hora = new Date().toLocaleTimeString();
            logLines.push(`[${hora}] ${texto}`);
            
            if(logLines.length > MAX_LOG_LINES) {
                logLines.shift();
            }
            
            log.innerHTML = '<strong>Log de Eventos:</strong><br>' + logLines.join('<br>');
            log.scrollTop = log.scrollHeight;
        }
        
        function limparLogs() {
            logLines = [];
            const log = document.getElementById('logEventos');
            log.innerHTML = '<strong>Log de Eventos:</strong><br>';
            addLog("Logs limpos");
        }
        
        // ===== BLUETOOTH =====
        async function scanDevices() {
            if (!nomeIndividuo) {
                alert("Configure o nome do individuo primeiro!");
                document.getElementById('modalConfig').classList.remove('hidden');
                return;
            }
            
            try {
                addLog("Buscando dispositivos...");
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'ColeiraInteligente' },
                        { services: [SERVICE_UUID] }
                    ],
                    optionalServices: [SERVICE_UUID]
                });
                
                addLog(`Dispositivo selecionado para ${nomeIndividuo}: ${device.name}`);
                document.getElementById('status').innerText = 'Selecionado: ' + device.name;
                document.getElementById('btnLigar').style.display = 'inline';
                document.getElementById('btnLimparLogs').style.display = 'inline';
                
            } catch(erro) {
                if(erro.message.includes('cancelled')) {
                    addLog("Busca cancelada");
                } else {
                    addLog("Erro: " + erro.message);
                }
            }
        }
        
        async function conectar() {
            if (!nomeIndividuo) {
                alert("Configure o nome do individuo primeiro!");
                document.getElementById('modalConfig').classList.remove('hidden');
                return;
            }
            
            try {
                addLog(`Conectando (monitorando ${nomeIndividuo})...`);
                
                if(!device) {
                    addLog("Erro: Nenhum dispositivo selecionado");
                    return;
                }
                
                device.removeEventListener('gattserverdisconnected', onDisconnected);
                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', receberDados);
                
                conectado = true;
                
                document.getElementById('status').innerText = `Conectado - Monitorando ${nomeIndividuo}`;
                document.getElementById('btnLigar').style.display = 'none';
                document.getElementById('btnDesligar').style.display = 'inline';
                
                addLog(`Conectado! Monitorando ${nomeIndividuo} com sucesso!`);
                
            } catch(erro) {
                addLog("Erro ao conectar: " + erro.message);
                resetConexao();
            }
        }
        
        async function desconectar() {
            try {
                addLog("Desconectando...");
                
                if(characteristic) {
                    try { await characteristic.stopNotifications(); } catch(e) {}
                    characteristic.removeEventListener('characteristicvaluechanged', receberDados);
                    characteristic = null;
                }
                
                if(server) {
                    try { if(server.connected) server.disconnect(); } catch(e) {}
                    server = null;
                }
                
                if(device) {
                    device.removeEventListener('gattserverdisconnected', onDisconnected);
                }
                
                onDisconnected();
                
            } catch(erro) {
                addLog("Erro ao desconectar: " + erro.message);
                resetConexao();
            }
        }
        
        function resetConexao() {
            addLog("Resetando conexao...");
            
            device = null;
            server = null;
            characteristic = null;
            conectado = false;
            
            document.getElementById('status').innerText = 'Nao conectado';
            document.getElementById('btnLigar').style.display = 'none';
            document.getElementById('btnDesligar').style.display = 'none';
            document.getElementById('btnLimparLogs').style.display = 'none';
            document.getElementById('campoDistancia').value = '';
            document.getElementById('campoAceleracao').value = '';
            document.getElementById('campoComportamento').value = '';
            
            const alerta = document.getElementById('alerta');
            alerta.className = 'alerta parado';
            document.getElementById('alertaTexto').innerText = 'Aguardando dados...';
            
            addLog("Conexao resetada. Selecione o dispositivo novamente.");
        }
        
        function onDisconnected() {
            addLog("Desconectado automaticamente");
            resetConexao();
        }
        
        // ===== PROCESSAMENTO DE DADOS =====
        function receberDados(event) {
            if(!conectado) return;
            
            const valor = event.target.value;
            const texto = new TextDecoder().decode(valor);
            const partes = texto.split(',');
            
            if(partes.length >= 6) {
                const ax = parseFloat(partes[0]);
                const ay = parseFloat(partes[1]);
                const az = parseFloat(partes[2]);
                const gx = parseFloat(partes[3]);
                const gy = parseFloat(partes[4]);
                const gz = parseFloat(partes[5]);
                
                rssiVariacao = (Math.random() - 0.5) * 10;
                let rssiAtual = rssiBase + rssiVariacao;
                rssiAtual = Math.max(-90, Math.min(-40, rssiAtual));
                
                const magTotal = Math.sqrt(ax**2 + ay**2 + az**2);
                const acelLinear = Math.max(0, magTotal - 9.8);
                const giroMag = Math.sqrt(gx**2 + gy**2 + gz**2);
                
                let comportamento = '';
                let classeAlerta = '';
                let mensagemAlerta = '';
                
                if (acelLinear < 0.8 && giroMag < 0.3) {
                    comportamento = 'PARADO';
                    classeAlerta = 'parado';
                    mensagemAlerta = `${nomeIndividuo} em repouso`;
                } else if (acelLinear < 2.0 && giroMag < 1.0) {
                    comportamento = 'MOVIMENTO LEVE';
                    classeAlerta = 'movimento-leve';
                    mensagemAlerta = `Movimento leve de ${nomeIndividuo}`;
                } else if (acelLinear < 5.0 && giroMag < 2.5) {
                    comportamento = 'ANDANDO';
                    classeAlerta = 'andando';
                    mensagemAlerta = `${nomeIndividuo} está caminhando`;
                } else if (giroMag < 5.0) {
                    comportamento = 'CORRENDO';
                    classeAlerta = 'correndo';
                    mensagemAlerta = `${nomeIndividuo} está correndo`;
                } else {
                    comportamento = 'AGITADO';
                    classeAlerta = 'agitado';
                    mensagemAlerta = `${nomeIndividuo} agitado/estressado`;
                }
                
                let distancia = '';
                if(rssiAtual > -50) {
                    distancia = 'Proximo (< 1m)';
                } else if(rssiAtual > -70) {
                    distancia = 'Medio (1-3m)';
                } else {
                    distancia = 'Distante (> 3m)';
                }
                
                document.getElementById('campoDistancia').value = 
                    `RSSI: ${rssiAtual.toFixed(0)} dBm - ${distancia}`;
                
                document.getElementById('campoAceleracao').value = 
                    `${comportamento} (Acel: ${acelLinear.toFixed(2)} | Giro: ${giroMag.toFixed(2)})`;
                
                document.getElementById('campoComportamento').value = 
                    `Estado: ${comportamento}`;
                
                const alerta = document.getElementById('alerta');
                alerta.className = `alerta ${classeAlerta}`;
                document.getElementById('alertaTexto').innerText = mensagemAlerta;
                
                addLog(`${comportamento} | RSSI: ${rssiAtual.toFixed(0)} | Acel: ${acelLinear.toFixed(2)} | Giro: ${giroMag.toFixed(2)}`);
            }
        }
        
        // Inicializa ao carregar
        init();
    </script>
</body>
</html>
